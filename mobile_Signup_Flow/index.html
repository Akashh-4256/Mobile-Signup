<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AkashHub - Welcome</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

<div class="left">

<h1>AkashHub</h1>

<p>
Join thousands of users managing their digital life with
our secure and modern platform.
</p>

<div class="features">

<div class="feature">
<i class="fa-solid fa-shield-halved"></i>
<span>Secure Login</span>
</div>

<div class="feature">
<i class="fa-solid fa-cloud"></i>
<span>Cloud Sync</span>
</div>

<div class="feature">
<i class="fa-solid fa-mobile-screen-button"></i>
<span>Responsive Design</span>
</div>

</div>

</div>

<div class="right">

<div class="card">

<h2>Welcome Back</h2>

<p class="subtitle">
Login to continue
</p>

<form id="loginForm">

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Email Address"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Password"
required>

<i class="fa-solid fa-eye togglePassword"></i>

</div>

<div class="row">

<label>

<input type="checkbox">

Remember Me

</label>

<a href="forgot.html">

Forgot Password?

</a>

</div>

<button type="submit">

Login

</button>

</form>

<div class="divider">

OR

</div>

<a href="signup.html" class="signup-btn">

Create New Account

</a>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
